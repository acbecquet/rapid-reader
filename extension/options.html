<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font: 13px/1.5 system-ui, sans-serif;
      background: #16161c;
      color: #d6d6dc;
      margin: 0;
      padding: 16px;
      min-width: 320px;
    }
    h1 { font-size: 14px; margin: 0 0 12px; }
    label { display: block; margin: 10px 0; color: #7c7c88; font-size: 12px; }
    label.check { display: flex; align-items: center; gap: 7px; color: #d6d6dc; }
    input[type=url], input[type=password] {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 4px;
      background: #101014;
      color: #d6d6dc;
      border: 1px solid #26262e;
      border-radius: 6px;
      padding: 7px 9px;
      font: inherit;
    }
    button {
      background: #e0443e;
      color: #fff;
      border: 0;
      border-radius: 6px;
      padding: 7px 16px;
      font: inherit;
      cursor: pointer;
      margin-top: 8px;
    }
    #msg { margin-top: 10px; font-size: 12px; min-height: 1.2em; }
    #msg.ok { color: #66bb6a; }
    #msg.err { color: #e8a13c; }
  </style>
</head>
<body>
  <h1>Rapid Reader Capture</h1>
  <label>Server URL
    <input id="server" type="url" placeholder="https://your-app.vercel.app">
  </label>
  <label>Access token
    <input id="token" type="password" placeholder="RAPID_READER_TOKEN">
  </label>
  <label class="check">
    <input id="instant" type="checkbox">
    Instant mode — send every selection automatically (no button)
  </label>
  <button id="save">Save &amp; test</button>
  <div id="msg"></div>
  <script src="options.js"></script>
</body>
</html>
